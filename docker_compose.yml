version: "3.9"
services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  worker:
    build: .
    env_file: .env
    command: celery -A app.tasks.celery_tasks.celery_app worker --loglevel=info

  dashboard:
    build: .
    ports:
      - "8501:8501"
    env_file: .env
    command: streamlit run app/dashboard/streamlit_app.py

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: market_agent
    ports:
      - "5432:5432"
